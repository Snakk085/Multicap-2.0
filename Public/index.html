<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multicap Login</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Estilos base mantidos (Dark Mode) */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #121214; color: #e1e1e6; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* Estilos da Tela de Login */
        #login-screen { width: 100%; max-width: 400px; background: #202024; padding: 30px; border-radius: 12px; border: 1px solid #323238; text-align: center; }
        .hidden { display: none !important; }
        h2 { color: #04d361; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #323238; background: #121214; color: white; }
        
        /* Dashboard (Oculto inicialmente) */
        #dashboard-screen { width: 100%; max-width: 1000px; padding: 20px; }
        /* (Aqui você mantém o restante do seu CSS do Dashboard original) */
    </style>
</head>
<body>

<!-- Tela de Login/Cadastro -->
<div id="login-screen">
    <h2 id="auth-title">Acessar Multicap</h2>
    
    <input type="text" id="username" placeholder="Nome de usuário">
    <input type="password" id="password" placeholder="Sua senha">
    
    <!-- Botão Dinâmico -->
    <button id="auth-btn" onclick="processAuth()" style="width: 100%; padding: 12px; background: #04d361; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px;">Entrar</button>
    
    <p id="toggle-text" style="margin-top: 15px; font-size: 14px; cursor: pointer; color: #8d8d99;">
        Não tem conta? <span onclick="toggleMode()" style="color: #04d361; font-weight: bold;">Criar conta</span>
    </p>
</div>

<!-- Dashboard (Oculto por padrão) -->
<div id="dashboard-screen" class="hidden">
    <h1>Dashboard Financeiro</h1>
    <!-- (Aqui entra todo o seu HTML do Dashboard que já estava funcionando) -->
</div>

<script>

let isRegisterMode = false;

function toggleMode() {
    isRegisterMode = !isRegisterMode;
    const title = document.getElementById('auth-title');
    const btn = document.getElementById('auth-btn');
    const toggleText = document.getElementById('toggle-text');

    if (isRegisterMode) {
        title.innerText = "Criar conta";
        btn.innerText = "Cadastrar";
        toggleText.innerHTML = 'Já tem conta? <span onclick="toggleMode()" style="color: #04d361; font-weight: bold;">Entrar</span>';
    } else {
        title.innerText = "Acessar Multicap";
        btn.innerText = "Entrar";
        toggleText.innerHTML = 'Não tem conta? <span onclick="toggleMode()" style="color: #04d361; font-weight: bold;">Criar conta</span>';
    }
}

function processAuth() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;

    if (isRegisterMode) {
        console.log("Enviando cadastro para o servidor:", user, pass);
        // Aqui chamaremos a rota POST /register em breve
    } else {
        console.log("Enviando login para o servidor:", user, pass);
        // Aqui chamaremos a rota POST /login em breve
        
        // Simulação de sucesso (remover depois)
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('dashboard-screen').classList.remove('hidden');
        fetchTransactions();
    }
}

    function handleLogin() {
        // Por enquanto, apenas troca a tela sem verificar senha
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('dashboard-screen').classList.remove('hidden');
        fetchTransactions(); // Carrega os dados ao logar
    }

    function toggleRegister() {
        alert("Navegando para tela de cadastro...");
    }

    // (Aqui você mantém o resto do seu JS original de busca de transações)
</script>

</body>
</html>

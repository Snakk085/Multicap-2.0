<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multicap - Controle Financeiro</title>
    <!-- Importação do Gráfico -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #121214; color: #e1e1e6; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .hidden { display: none !important; }

        /* Telas */
        #login-screen, #dashboard-screen { width: 100%; max-width: 500px; background: #202024; padding: 40px; border-radius: 12px; border: 1px solid #323238; }
        #dashboard-screen { max-width: 900px; }

        /* Estilos do Login */
        #login-screen { text-align: center; }
        #login-screen h2 { color: #04d361; margin-bottom: 30px; }
        
        /* Inputs e Botões */
        input, select { width: 100%; display: block; padding: 14px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #323238; background: #121214; color: white; }
        button { width: 100%; padding: 14px; background: #04d361; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: #121214; transition: 0.2s; }
        button:hover { background: #04b355; }
        
        .link-text { margin-top: 20px; font-size: 14px; color: #8d8d99; }
        .link-text span { color: #04d361; cursor: pointer; font-weight: bold; }

        /* Cabeçalho do Dashboard */
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .header-actions { display: flex; gap: 10px; align-items: center; }
        
        /* Seletor de Mês */
        #month-filter { margin-bottom: 0; padding: 10px; width: auto; background: #121214; border-color: #5e60ce; color: #5e60ce; font-weight: bold; cursor: pointer; }
        
        .btn-sair { background: #f75a68; color: white; width: auto; padding: 10px 16px; margin: 0;}
        .btn-sair:hover { background: #e04855; }

        /* Cards em Grid */
        .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
        @media (max-width: 768px) { .cards { grid-template-columns: repeat(2, 1fr); } }
        
        .card { padding: 20px; border-radius: 8px; border: 1px solid #323238; text-align: center; }
        .card-income { background: rgba(4, 211, 97, 0.05); border-color: rgba(4, 211, 97, 0.3); }
        .card-expense { background: rgba(247, 90, 104, 0.05); border-color: rgba(247, 90, 104, 0.3); }
        .card-invest { background: rgba(94, 96, 206, 0.05); border-color: rgba(94, 96, 206, 0.3); }
        .card-balance { background: rgba(255, 183, 3, 0.05); border-color: rgba(255, 183, 3, 0.3); }
        
        .card h3 { font-size: 13px; color: #8d8d99; margin-bottom: 10px; font-weight: 500; }
        .card p { font-size: 20px; font-weight: bold; }
        #total-income { color: #04d361; }
        #total-expense { color: #f75a68; }
        #total-invest { color: #5e60ce; }
        #total-balance { color: #ffb703; }

        /* Área de Investimento Automático */
        .auto-invest-box { background: #121214; padding: 15px; border-radius: 8px; border: 1px dashed #5e60ce; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        .auto-invest-box label { font-size: 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; color: #5e60ce; font-weight: bold; }
        
        /* Layout Gráfico e Formulário */
        .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        @media (max-width: 768px) { .content-grid { grid-template-columns: 1fr; } }
        .chart-container { background: #121214; padding: 20px; border-radius: 8px; border: 1px solid #323238; display: flex; justify-content: center; align-items: center; min-height: 300px;}
        
        /* Lista de Transações */
        .list-header { margin-bottom: 15px; border-bottom: 1px solid #323238; padding-bottom: 10px; }
        ul { list-style: none; max-height: 400px; overflow-y: auto; padding-right: 5px; }
        li { background: #121214; padding: 15px; border-radius: 6px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #323238; }
        .item-info { display: flex; flex-direction: column; }
        .item-title { font-weight: bold; }
        .item-meta { font-size: 12px; color: #8d8d99; margin-top: 5px; }
        .item-value { font-weight: bold; display: flex; align-items: center; gap: 15px; }
        .val-income { color: #04d361; }
        .val-expense { color: #f75a68; }
        .val-invest { color: #5e60ce; }
        .delete-btn { background: transparent; color: #8d8d99; padding: 5px; width: auto; font-size: 16px; }
        .delete-btn:hover { color: #f75a68; background: transparent; }
    </style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="login-screen">
    <h2 id="auth-title">Acessar Multicap</h2>
    <input type="text" id="username" placeholder="Usuário">
    <input type="password" id="password" placeholder="Senha">
    <button id="auth-btn" onclick="processAuth()">Entrar</button>
    <p class="link-text"><span id="toggle-text" onclick="toggleMode()">Criar conta</span></p>
</div>

<!-- TELA DO DASHBOARD -->
<div id="dashboard-screen" class="hidden">
    <div class="dashboard-header">
        <h2>Dashboard Financeiro</h2>
        
        <!-- Novo Pedaço: Seletor de Mês e Botão Sair lado a lado -->
        <div class="header-actions">
            <input type="month" id="month-filter" title="Filtrar por mês">
            <button onclick="logout()" class="btn-sair">Sair</button>
        </div>
    </div>

    <!-- Os 4 Cards -->
    <div class="cards">
        <div class="card card-income">
            <h3>Total Ganho</h3>
            <p id="total-income">R$ 0,00</p>
        </div>
        <div class="card card-expense">
            <h3>Total Gasto</h3>
            <p id="total-expense">R$ 0,00</p>
        </div>
        <div class="card card-invest">
            <h3>Total Investido</h3>
            <p id="total-invest">R$ 0,00</p>
        </div>
        <div class="card card-balance">
            <h3>Saldo Livre</h3>
            <p id="total-balance">R$ 0,00</p>
        </div>
    </div>

    <div class="content-grid">
        <!-- Formulário -->
        <div class="form-container">
            <form id="transaction-form">
                <input type="text" id="desc" placeholder="Descrição (Ex: Salário, Mercado)" required>
                <input type="number" id="amount" placeholder="Valor (Ex: 150.00)" step="0.01" required>
                <input type="date" id="date" required>
                
                <select id="type">
                    <option value="income">Receita (Entrada)</option>
                    <option value="expense">Despesa (Saída)</option>
                    <option value="investment">Investimento (Aporte)</option>
                </select>
                
                <!-- Calculadora de Investimento -->
                <div id="auto-invest-container" class="auto-invest-box hidden">
                    <label>
                        <input type="checkbox" id="check-auto-invest" style="width: auto; margin:0; padding:0;"> 
                        Separar % para investimento?
                    </label>
                    <input type="number" id="invest-percent" placeholder="Quantos % ? (Ex: 20)" min="1" max="100" class="hidden" style="margin-bottom: 0;">
                </div>

                <select id="category"></select>
                
                <button type="submit">Adicionar Transação</button>
            </form>
        </div>

        <!-- Gráfico de Raio-X -->
        <div class="chart-container">
            <canvas id="financeChart"></canvas>
        </div>
    </div>

    <!-- Lista de Histórico -->
    <h3 class="list-header">Histórico de Movimentações (Mês Selecionado)</h3>
    <ul id="transaction-list"></ul>
</div>

<script>
    const API_URL = '/api';
    let isRegisterMode = false;
    let chartInstance = null; 
    let allTransactions = []; // <-- VAI GUARDAR TUDO DO BANCO AQUI

    // 1. Configurar o Filtro de Mês Inicial
    const monthFilterInput = document.getElementById('month-filter');
    
    function setInitialMonth() {
        const today = new Date();
        // Converte a data de hoje para o formato YYYY-MM
        const currentMonth = today.toISOString().slice(0, 7); 
        monthFilterInput.value = currentMonth;
    }
    
    // Quando o usuário trocar o mês no calendário, refiltra a tela
    monthFilterInput.addEventListener('change', filterAndRender);

    // 2. Categorias
    const categories = {
        income: ['Salário', 'Freelance', 'Venda', 'Outros'],
        expense: ['Gasto Fixo', 'Mercado', 'Assinaturas', 'Pet', 'Lazer', 'Alimentação', 'Transporte', 'Outros'],
        investment: ['Reserva de Emergência', 'Ações', 'Renda Fixa', 'Cripto', 'Outros']
    };

    function updateCategories() {
        const type = document.getElementById('type').value;
        const catSelect = document.getElementById('category');
        const autoInvestBox = document.getElementById('auto-invest-container');
        
        catSelect.innerHTML = ''; 
        categories[type].forEach(cat => {
            const option = document.createElement('option');
            option.value = cat;
            option.innerText = cat;
            catSelect.appendChild(option);
        });

        if(type === 'income') {
            autoInvestBox.classList.remove('hidden');
        } else {
            autoInvestBox.classList.add('hidden');
            document.getElementById('check-auto-invest').checked = false;
            document.getElementById('invest-percent').classList.add('hidden');
            document.getElementById('invest-percent').value = '';
        }
    }

    document.getElementById('check-auto-invest').addEventListener('change', (e) => {
        const percentInput = document.getElementById('invest-percent');
        if(e.target.checked) percentInput.classList.remove('hidden');
        else percentInput.classList.add('hidden');
    });

    document.getElementById('type').addEventListener('change', updateCategories);
    updateCategories();

    // 3. Autenticação 
    function toggleMode() { 
        isRegisterMode = !isRegisterMode;
        document.getElementById('auth-title').innerText = isRegisterMode ? "Criar nova conta" : "Acessar Multicap";
        document.getElementById('auth-btn').innerText = isRegisterMode ? "Cadastrar" : "Entrar";
        document.getElementById('toggle-text').innerText = isRegisterMode ? "Já tem conta? Fazer Login" : "Criar conta";
    }

    async function processAuth() { 
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        if(!username || !password) return alert("Preencha usuário e senha!");
        const endpoint = isRegisterMode ? '/register' : '/login';
        try {
            const res = await fetch(API_URL + endpoint, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (res.ok) {
                if (!isRegisterMode) {
                    localStorage.setItem('userId', data.userId);
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('dashboard-screen').classList.remove('hidden');
                    setInitialMonth(); // Define o mês atual
                    fetchTransactions();
                } else { alert("Conta criada! Faça login."); toggleMode(); }
            } else { alert(data.error); }
        } catch(e) { alert("Erro de comunicação."); }
    }

    function logout() { localStorage.removeItem('userId'); location.reload(); }
    
    window.onload = () => {
        if(localStorage.getItem('userId')) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
            setInitialMonth(); // Define o mês atual logo ao abrir
            fetchTransactions();
        }
    }

    // 4. Lógica do Banco e da Peneira Mensal
    async function fetchTransactions() {
        const userId = localStorage.getItem('userId');
        if(!userId) return;
        
        // Puxa ABSOLUTAMENTE TUDO do banco e guarda na variável
        const res = await fetch(`${API_URL}/transactions/${userId}`);
        allTransactions = await res.json();
        
        // Em vez de renderizar tudo, chama a peneira
        filterAndRender(); 
    }

    function filterAndRender() {
        const selectedMonth = monthFilterInput.value; // Ex: "2026-07"
        
        if (!selectedMonth) {
            render(allTransactions); // Se der algum bug e o mês sumir, mostra tudo
            return;
        }

        // A Peneira: Filtra as transações onde a data (Ex: 2026-07-16) começa com o mês escolhido
        const filteredTransactions = allTransactions.filter(t => {
            return t.date.startsWith(selectedMonth);
        });

        // Manda apenas as transações do mês escolhido para os gráficos e cards!
        render(filteredTransactions); 
    }

    // Salvar nova transação
    document.getElementById('transaction-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const userId = localStorage.getItem('userId');
        const amount = parseFloat(document.getElementById('amount').value);
        const type = document.getElementById('type').value;
        const date = document.getElementById('date').value;
        
        await fetch(API_URL + '/transactions', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({
                desc: document.getElementById('desc').value,
                amount: amount,
                date: date,
                type: type,
                category: document.getElementById('category').value,
                userId
            }) 
        });

        const isAutoInvest = document.getElementById('check-auto-invest').checked;
        const percent = parseFloat(document.getElementById('invest-percent').value);

        if(type === 'income' && isAutoInvest && percent > 0) {
            const investAmount = amount * (percent / 100);
            await fetch(API_URL + '/transactions', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({
                    desc: 'Investimento Automático',
                    amount: investAmount,
                    date: date,
                    type: 'investment',
                    category: 'Reserva de Emergência', 
                    userId
                }) 
            });
            alert(`Salvo: Entrada de R$ ${amount} e separado R$ ${investAmount} (${percent}%) para investimento.`);
        }

        document.getElementById('transaction-form').reset();
        updateCategories();
        
        // Força a data selecionada no formulário a ser a data de hoje novamente
        document.getElementById('date').value = new Date().toISOString().split('T')[0];
        
        fetchTransactions(); // Baixa a lista nova e já passa na peneira
    });

    async function removeTransaction(id) {
        await fetch(`${API_URL}/transactions/${id}`, { method: 'DELETE' });
        fetchTransactions();
    }

    // 5. Renderização (Cards e Lista)
    function render(transactionsToRender) {
        const list = document.getElementById('transaction-list');
        list.innerHTML = '';
        
        let totalIncome = 0; let totalExpense = 0; let totalInvest = 0;
        const chartDataMap = {}; 

        transactionsToRender.forEach(t => {
            const amount = parseFloat(t.amount);
            
            if (t.type === 'income') totalIncome += amount;
            else if (t.type === 'investment') totalInvest += amount;
            else totalExpense += amount;

            if(t.type !== 'income') {
                if(!chartDataMap[t.category]) chartDataMap[t.category] = 0;
                chartDataMap[t.category] += amount;
            }

            let valClass = 'val-expense'; let signal = '-';
            if(t.type === 'income') { valClass = 'val-income'; signal = '+'; }
            else if(t.type === 'investment') { valClass = 'val-invest'; signal = '↓'; }

            const dataFormatada = t.date.split('-').reverse().join('/');

            const li = document.createElement('li');
            li.innerHTML = `
                <div class="item-info">
                    <span class="item-title">${t.desc}</span>
                    <span class="item-meta">${t.category} | ${dataFormatada}</span>
                </div>
                <div class="item-value">
                    <span class="${valClass}">${signal} R$ ${amount.toFixed(2)}</span>
                    <button class="delete-btn" onclick="removeTransaction(${t.id})" title="Apagar">✖</button>
                </div>
            `;
            list.appendChild(li);
        });

        const balance = totalIncome - totalExpense - totalInvest;

        document.getElementById('total-income').innerText = `R$ ${totalIncome.toFixed(2)}`;
        document.getElementById('total-expense').innerText = `R$ ${totalExpense.toFixed(2)}`;
        document.getElementById('total-invest').innerText = `R$ ${totalInvest.toFixed(2)}`;
        document.getElementById('total-balance').innerText = `R$ ${balance.toFixed(2)}`;

        renderDetailedChart(chartDataMap);
    }

    // 6. Gráfico Detalhado
    function renderDetailedChart(dataMap) {
        const ctx = document.getElementById('financeChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();

        const categories = Object.keys(dataMap);
        const values = Object.values(dataMap);

        if (categories.length === 0) return; 

        const colors = ['#f75a68', '#5e60ce', '#ffb703', '#fb8500', '#04d361', '#8ecae6', '#219ebc', '#023047'];

        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: categories,
                datasets: [{
                    data: values,
                    backgroundColor: colors.slice(0, categories.length), 
                    borderWidth: 0,
                    hoverOffset: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom', labels: { color: '#e1e1e6', padding: 15 } },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                let label = context.label || '';
                                let value = context.raw;
                                let total = context.chart._metasets[context.datasetIndex].total;
                                let percentage = ((value / total) * 100).toFixed(1) + '%';
                                return `${label}: R$ ${value.toFixed(2)} (${percentage})`;
                            }
                        }
                    }
                }
            }
        });
    }
</script>
</body>
</html>
